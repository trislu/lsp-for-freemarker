# is_date_like
---
> category: [Seldom used and expert built-ins](https://freemarker.apache.org/docs/ref_builtins_expert.html#ref_builtin_isType)
---
Returns `true` if the value is date-like, meaning either date, time, or date-time, or date-like with unknown precise type.

> __Note:__
> Available since FreeMarker 2.3.21.
