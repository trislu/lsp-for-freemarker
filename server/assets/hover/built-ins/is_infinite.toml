markdown = """
# is_infinite
---
> category: [Built-ins for numbers](https://freemarker.apache.org/docs/ref_builtins_number.html#ref_builtin_is_infinite)
---
> __Note:__
> This built-in exists since FreeMarker 2.3.20.

Tells if a number is floating point infinite (according to IEEE 754). For example, `someNumber?is_infinite` evaluates to `true` or `false` depending on if the value of `someNumber` is infinite or not. If the underlying number is not of floating point type, this will always return `false`.
"""
