markdown = """
# floor
---
> category: [Built-ins for numbers](https://freemarker.apache.org/docs/ref_builtins_number.html#ref_builtin_rounding)
---
Rounds the number downwards (i.e., towards negative infinity).

```template
${1.5?floor}
${-1.5?floor}
${1.75?floor}
```
Output:
```output
1
-2
1
```

See also: `round`, `ceiling`
"""
