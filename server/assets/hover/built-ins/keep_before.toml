identifier = "keep_before"
category = "built-in"
markdown = """
# keep_before
---
> category: [Built-ins for strings](https://freemarker.apache.org/docs/ref_builtins_string.html#ref_builtin_keep_before)
---
> __Note:__
> This built-in is available since FreeMarker 2.3.21.

Removes the part of the string that starts with the given substring. For example:
```template
${"abcdef"?keep_before("de")}
```
Output:
```output
abc
```
If the parameter string is not found, it will return the original string unchanged. This method accepts an optional *flags* parameter, as its 2nd parameter.
"""
