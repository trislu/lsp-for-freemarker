# date
---
> category: [Built-ins for strings](https://freemarker.apache.org/docs/ref_builtins_string.html#ref_builtin_string_date)
---
> __Note:__
> This built-in works both [on strings](https://freemarker.apache.org/docs/ref_builtins_string.html#ref_builtin_string_date) and [on date/time/date-time values](https://freemarker.apache.org/docs/ref_builtins_date.html#ref_builtin_date_datetype).

**For strings:** Converts the string value to a date value. It will expect the format specified by the `date_format` setting. You can also specify the format explicitly like `?date.format` or `?date("format")`.
```template
<#assign someDate = "Oct 25, 1995"?date>
<#assign someDate = "1995-10-25"?date.xs>
<#assign someDate = "10/25/1995"?date("MM/dd/yyyy")>
```

**For date/time/date-time values:** Extracts the date part, discarding time of day.
"""
