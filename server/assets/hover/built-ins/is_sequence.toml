# is_sequence
---
> category: [Seldom used and expert built-ins](https://freemarker.apache.org/docs/ref_builtins_expert.html#ref_builtin_isType)
---
Returns `true` if the value is a sequence.

*Historical quirk:* Before `incompatible_improvements` 2.3.24 it returns `true` for Java methods as they implement the `[index]` operator, however, they fail on `?size`.
"""
