name: VSCE Package

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build for Linux x64
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux
          path: target/x86_64-unknown-linux-musl/release/lsp-for-freemarker

  build-windows:
    name: Build Windows binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build for Windows x64
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows
          path: target/x86_64-pc-windows-gnu/release/lsp-for-freemarker.exe

  build-macos:
    name: Build macOS binary
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build for macOS arm64
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos
          path: target/release/lsp-for-freemarker

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux
          path: artifacts/linux

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: binary-windows
          path: artifacts/windows

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: binary-macos
          path: artifacts/macos

      - name: Copy server binaries
        run: |
          mkdir -p clients/vsce/resources/bin
          cp artifacts/windows/lsp-for-freemarker.exe clients/vsce/resources/bin/lsp-for-freemarker-win32.exe
          cp artifacts/linux/lsp-for-freemarker clients/vsce/resources/bin/lsp-for-freemarker-linux
          cp artifacts/macos/lsp-for-freemarker clients/vsce/resources/bin/lsp-for-freemarker-darwin
          chmod +x clients/vsce/resources/bin/lsp-for-freemarker-linux
          chmod +x clients/vsce/resources/bin/lsp-for-freemarker-darwin

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: clients/vsce
        run: npm install

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        working-directory: clients/vsce
        run: |
          mkdir -p ../../output
          vsce package -o ../../output/

      - name: Upload VSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsix-packages
          path: output/*.vsix
