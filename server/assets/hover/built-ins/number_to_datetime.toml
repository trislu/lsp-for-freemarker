# number_to_datetime
---
> category: [Seldom used and expert built-ins](https://freemarker.apache.org/docs/ref_builtins_expert.html#ref_builtin_numToDate)
---
Converts a number (usually a Java `long`) to a date-time. This does the same as `new java.util.Date(long)` in Java — the number is interpreted as milliseconds since the epoch.

